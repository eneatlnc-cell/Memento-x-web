<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memento — 启动器控制台</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #14141f;
  --ink: #e8e8ed;
  --muted: #7a7a8a;
  --rule: #2a2a3a;
  --accent: #00c864;
  --accent2: #4a90ff;
  --warn: #f0a030;
  --danger: #e04040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", "Noto Sans CJK SC", system-ui, sans-serif;
  background: var(--bg); color: var(--ink);
  line-height: 1.6; min-height: 100vh;
}
.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid var(--rule); margin-bottom: 24px;
}
header h1 { font-size: 20px; font-weight: 700; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  margin-right: 8px; vertical-align: middle;
}
.status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.status-dot.offline { background: var(--muted); }
.status-dot.error { background: var(--danger); }

/* Cards */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 10px; padding: 20px;
}
.card h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.card .value { font-size: 28px; font-weight: 700; }
.card .label { font-size: 12px; color: var(--muted); }

/* Buttons */
.btn-row { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.btn {
  padding: 10px 22px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover:not(:disabled) { background: #00e878; }
.btn-secondary { background: var(--bg2); color: var(--ink); border: 1px solid var(--rule); }
.btn-secondary:hover:not(:disabled) { background: var(--rule); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #f05050; }

/* Progress */
.progress-bar {
  width: 100%; height: 6px; background: var(--rule); border-radius: 3px;
  margin: 12px 0; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.3s;
}

/* Log */
.log-area {
  background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 10px; padding: 16px; max-height: 300px;
  overflow-y: auto; font-family: "JetBrains Mono", "Fira Code", monospace;
  font-size: 12px; line-height: 1.5; color: var(--muted);
  white-space: pre-wrap; word-break: break-all;
}
.log-area::-webkit-scrollbar { width: 6px; }
.log-area::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

/* Settings */
.settings {
  background: var(--bg2); border: 1px solid var(--rule);
  border-radius: 10px; padding: 20px; margin-bottom: 24px;
}
.settings h3 { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.field input {
  width: 100%; padding: 8px 12px; background: var(--bg); color: var(--ink);
  border: 1px solid var(--rule); border-radius: 6px; font-size: 14px;
}
.field input:focus { outline: none; border-color: var(--accent); }
.hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* Animation */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.pulse { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div class="container">

<header>
  <h1><span class="status-dot offline" id="globalDot"></span>Memento 启动器</h1>
  <span style="font-size:13px;color:var(--muted)" id="versionTag">v2.0.0</span>
</header>

<!-- 状态卡片 -->
<div class="grid">
  <div class="card">
    <h3>容器状态</h3>
    <div class="value" id="containerStatus">⚪ 未检测</div>
  </div>
  <div class="card">
    <h3>GPU</h3>
    <div class="value" id="gpuModel">—</div>
    <div class="label" id="gpuVram">显存: —</div>
  </div>
  <div class="card">
    <h3>云端连接</h3>
    <div class="value" id="cloudStatus">—</div>
  </div>
  <div class="card">
    <h3>运行时间</h3>
    <div class="value" id="uptime">—</div>
  </div>
</div>

<!-- 操作按钮 -->
<div class="btn-row">
  <button class="btn btn-primary" id="btnInstall" onclick="doInstall()">安装 / 拉取镜像</button>
  <button class="btn btn-secondary" id="btnStart" onclick="doStart()">启动容器</button>
  <button class="btn btn-danger" id="btnStop" onclick="doStop()">停止容器</button>
  <button class="btn btn-secondary" onclick="refreshAll()">刷新状态</button>
</div>

<!-- 安装进度 -->
<div id="installSection" style="display:none">
  <div class="card" style="margin-bottom:24px">
    <h3>安装进度</h3>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="label" id="progressText">准备中...</div>
  </div>
</div>

<!-- 日志 -->
<div class="card" style="margin-bottom:24px">
  <h3>启动器日志</h3>
  <div class="log-area" id="logArea">正在连接...</div>
</div>

<!-- 设置 -->
<div class="settings">
  <h3>设置</h3>
  <div class="field">
    <label>云端 API 地址</label>
    <input type="text" id="cfgApiUrl" placeholder="http://localhost:8000/api/v1">
  </div>
  <div class="field">
    <label>用户 Token</label>
    <input type="password" id="cfgToken" placeholder="输入你的 Token...">
    <div class="hint">在 Memento 网站注册后获取</div>
  </div>
  <div class="field">
    <label>用户 ID</label>
    <input type="text" id="cfgUserId" placeholder="你的用户 ID">
  </div>
  <button class="btn btn-primary" onclick="saveConfig()">保存设置</button>
</div>

</div>

<script>
const API = 'http://127.0.0.1:8189';
let pollTimer = null;

// ── 工具函数 ──
async function fetchJSON(url, opts = {}) {
  try {
    const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.warn('fetchJSON failed:', url, e.message);
    return null;
  }
}

function formatUptime(s) {
  if (!s) return '—';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── 刷新状态 ──
async function refreshAll() {
  const [status, health, config] = await Promise.all([
    fetchJSON(`${API}/status`),
    fetchJSON(`${API}/health`),
    fetchJSON(`${API}/config`),
  ]);

  // 全局状态点
  const dot = document.getElementById('globalDot');
  dot.className = 'status-dot ' + (status?.online ? 'online' : 'offline');

  // 版本
  if (config) document.getElementById('versionTag').textContent = 'v' + config.version;

  // 容器状态
  const cs = document.getElementById('containerStatus');
  if (status?.container_running) {
    cs.innerHTML = '🟢 运行中';
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
  } else if (status?.status === 'installing') {
    cs.innerHTML = '🟡 安装中...';
  } else {
    cs.innerHTML = status?.status === 'error' ? '🔴 错误' : '⚪ 空闲';
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
  }

  // GPU
  document.getElementById('gpuModel').textContent = status?.gpu_model || '—';
  document.getElementById('gpuVram').textContent = `显存: ${status?.vram_gb || '—'} GB`;

  // 云端
  document.getElementById('cloudStatus').textContent = status?.online ? '🟢 在线' : '⚪ 离线';

  // 运行时间
  document.getElementById('uptime').textContent = formatUptime(health?.uptime_seconds);

  // 按钮状态
  document.getElementById('btnInstall').disabled = status?.status === 'installing';
}

// ── 刷新日志 ──
async function refreshLogs() {
  try {
    const res = await fetch(`${API}/logs`);
    const text = await res.text();
    document.getElementById('logArea').textContent = text || '暂无日志';
    document.getElementById('logArea').scrollTop = document.getElementById('logArea').scrollHeight;
  } catch (e) {
    document.getElementById('logArea').textContent = '无法连接到启动器 (127.0.0.1:8189)';
  }
}

// ── 安装 ──
async function doInstall() {
  const btn = document.getElementById('btnInstall');
  btn.disabled = true;
  btn.textContent = '安装中...';
  document.getElementById('installSection').style.display = 'block';

  // 轮询进度
  const progressPoller = setInterval(async () => {
    const p = await fetchJSON(`${API}/install/progress`);
    if (p) {
      document.getElementById('progressFill').style.width = (p.progress * 100) + '%';
      document.getElementById('progressText').textContent = p.status;
    }
  }, 1000);

  try {
    const res = await fetch(`${API}/install`, { method: 'POST' });
    clearInterval(progressPoller);
    if (res.ok) {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = '安装完成！';
    } else {
      document.getElementById('progressText').textContent = '安装失败: ' + (await res.text());
    }
  } catch (e) {
    clearInterval(progressPoller);
    document.getElementById('progressText').textContent = '安装失败: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '安装 / 拉取镜像';
  setTimeout(refreshAll, 2000);
}

// ── 启动/停止 ──
async function doStart() {
  try {
    await fetch(`${API}/start`, { method: 'POST' });
    refreshAll();
  } catch (e) { alert('启动失败: ' + e.message); }
}

async function doStop() {
  try {
    await fetch(`${API}/stop`, { method: 'POST' });
    refreshAll();
  } catch (e) { alert('停止失败: ' + e.message); }
}

// ── 保存配置 ──
async function saveConfig() {
  const body = {
    api_url: document.getElementById('cfgApiUrl').value,
    user_token: document.getElementById('cfgToken').value,
    user_id: document.getElementById('cfgUserId').value,
  };
  try {
    const res = await fetch(`${API}/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      alert('设置已保存');
    } else {
      alert('保存失败');
    }
  } catch (e) {
    alert('无法连接到启动器');
  }
}

// ── 加载配置 ──
async function loadConfig() {
  const config = await fetchJSON(`${API}/config`);
  if (config) {
    document.getElementById('cfgApiUrl').value = config.api_url || '';
    document.getElementById('cfgToken').value = config.user_token || '';
    document.getElementById('cfgUserId').value = config.user_id || '';
  }
}

// ── 初始化 ──
function init() {
  refreshAll();
  refreshLogs();
  loadConfig();
  pollTimer = setInterval(() => { refreshAll(); refreshLogs(); }, 5000);
}

init();
</script>
</body>
</html>
